site_name: Polivox Documentation

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

docs_dir: docs

markdown_extensions:
  - mdx_breakless_lists

plugins:
  - search
  - roamlinks

